name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  basic-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create egress rules
        run: |
          cat > egress-rules.yaml <<'EOF'
          rules:
            - host: example.com
              methods: ["GET"]
              paths: ["/*"]
          EOF

      - name: Set up iron-proxy
        uses: ./
        with:
          egress-rules: egress-rules.yaml
          warn: false
          disable-sudo: true
          disable-docker: true

      - name: Allowed host should succeed
        run: |
          HTTP_STATUS=$(curl -o /dev/null -w '%{http_code}' https://example.com)
          echo "example.com returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Expected example.com to succeed, got HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Blocked host should fail
        run: |
          if curl -f --max-time 5 https://httpbin.org/get 2>/dev/null; then
            echo "Expected httpbin.org to be blocked, but the request succeeded"
            exit 1
          fi
          echo "httpbin.org was correctly blocked"

      - name: Sudo should be disabled
        run: |
          if sudo -n true 2>/dev/null; then
            echo "Expected sudo to be disabled, but it still works"
            exit 1
          fi
          echo "sudo is correctly disabled"

      - name: Docker should be disabled
        run: |
          if docker ps 2>/dev/null; then
            echo "Expected docker to be disabled, but it still works"
            exit 1
          fi
          echo "docker is correctly disabled"

      - name: Generate egress summary
        if: always()
        uses: ./summary

      - name: Dump iron-proxy log
        if: always()
        run: cat /var/log/iron-proxy.log

  warn-mode-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create egress rules (only example.com)
        run: |
          cat > egress-rules.yaml <<'EOF'
          domains:
            - "example.com"
          EOF

      - name: Set up iron-proxy in warn mode
        uses: ./
        with:
          egress-rules: egress-rules.yaml
          warn: true
          disable-sudo: true
          disable-docker: true

      - name: Allowed host should succeed
        run: |
          HTTP_STATUS=$(curl -o /dev/null -w '%{http_code}' https://example.com)
          echo "example.com returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Expected example.com to succeed, got HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Non-allowlisted host should still succeed in warn mode
        run: |
          HTTP_STATUS=$(curl -o /dev/null -w '%{http_code}' --max-time 10 https://httpbin.org/get)
          echo "httpbin.org returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Expected httpbin.org to succeed in warn mode, got HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Verify warn action in logs
        run: |
          if ! grep -q '"action".*:.*"warn"' /var/log/iron-proxy.log; then
            echo "Expected to find '\"action\": \"warn\"' in iron-proxy logs"
            cat /var/log/iron-proxy.log
            exit 1
          fi
          echo "Found warn action in logs"

      - name: Generate egress summary
        if: always()
        uses: ./summary
        with:
          show-full-paths: true

      - name: Dump iron-proxy log
        if: always()
        run: cat /var/log/iron-proxy.log

  npm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create package.json
        run: |
          cat > package.json <<'EOF'
          {
            "name": "iron-proxy-npm-test",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "jest": "^30.3.0"
            }
          }
          EOF

      - name: Create egress rules
        run: |
          cat > egress-rules.yaml <<'EOF'
          domains:
            - "registry.npmjs.org"
            - "*.npmjs.org"
            - "*.npmjs.com"
          EOF

      - name: Set up iron-proxy
        uses: ./
        with:
          egress-rules: egress-rules.yaml
          warn: false
          disable-sudo: true
          disable-docker: true

      - name: npm install
        run: npm install

      - name: Verify install
        run: |
          npx jest --version

      - name: Generate egress summary
        if: always()
        uses: ./summary
        with:
          show-full-paths: true

      - name: Dump iron-proxy log
        if: always()
        run: cat /var/log/iron-proxy.log
