name: 'Iron Proxy'
description: 'Enforce default-deny egress in GitHub Actions. Block unexpected outbound requests and audit all traffic.'

branding:
  icon: 'shield'
  color: 'orange'

inputs:
  version:
    description: 'Version of Iron Proxy to install'
    required: false
    default: '0.16.0'
  egress-rules:
    description: 'Path to the egress rules file'
    required: false
    default: 'egress-rules.yaml'
  disable-sudo:
    description: 'Remove sudo access for the runner user to prevent subsequent steps from bypassing the proxy'
    required: false
    default: 'true'
  upstream-resolver:
    description: 'Upstream DNS resolver address'
    required: false
    default: '8.8.8.8:53'
  disable-docker:
    description: 'Remove the runner user from the docker group to prevent subsequent steps from bypassing the proxy'
    required: false
    default: 'true'
  warn:
    description: 'Log denied requests but do not block them'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up iron-proxy
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Detect architecture
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64)   ARCH=amd64 ;;
          aarch64|arm64)  ARCH=arm64 ;;
          *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        # Install dependencies. jq is installed via apt (integrity verified by
        # Ubuntu's signed package indexes); yq is downloaded directly with a
        # pinned SHA256 since it's not in the default apt repos.
        echo "::group::Install dependencies"
        if ! command -v jq &>/dev/null; then
          sudo apt-get install -y -qq jq > /dev/null
        fi

        YQ_VERSION="v4.53.2"
        case "$ARCH" in
          amd64) YQ_SHA256="d56bf5c6819e8e696340c312bd70f849dc1678a7cda9c2ad63eebd906371d56b" ;;
          arm64) YQ_SHA256="03061b2a50c7a498de2bbb92d7cb078ce433011f085a4994117c2726be4106ea" ;;
        esac
        if ! command -v yq &>/dev/null; then
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${ARCH}"
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -
          chmod +x /tmp/yq
          sudo mv /tmp/yq /usr/local/bin/yq
        fi
        echo "::endgroup::"

        # Resolve version
        echo "::group::Resolve iron-proxy version"
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh release view --repo ironsh/iron-proxy --json tagName -q '.tagName | ltrimstr("v")')
        fi
        echo "Using iron-proxy v${VERSION}"
        echo "::endgroup::"

        # Download and install iron-proxy. The release checksums.txt is GPG-verified
        # against the iron-proxy maintainer key (fingerprint
        # 7969C7E131F29652C601752C64D88022DBC645D1) inlined below; the binary is
        # then verified against the signed checksums.
        echo "::group::Download and install iron-proxy"
        ASSET="iron-proxy_${VERSION}_linux_${ARCH}.tar.gz"
        gh release download "v${VERSION}" --repo ironsh/iron-proxy \
          --pattern "$ASSET" --output /tmp/iron-proxy.tgz
        gh release download "v${VERSION}" --repo ironsh/iron-proxy \
          --pattern "checksums.txt" --output /tmp/iron-proxy-checksums.txt
        gh release download "v${VERSION}" --repo ironsh/iron-proxy \
          --pattern "checksums.txt.asc" --output /tmp/iron-proxy-checksums.txt.asc

        gpg --batch --import 2>/dev/null <<'PUBKEY_EOF'
        -----BEGIN PGP PUBLIC KEY BLOCK-----

        mQINBGnT1rIBEACxun8jGHSIJD+gH/y582JLuktMGpu8q7K6EuRiJX8C7vOTMwKc
        kKf7LYkD1WCm6GFy3QKSwLi7EouS4eiCyc3kvLJPSPkqMc6gDX6MH0df98NkMf54
        5E6xxLrAOeHTN9D2ELj+nOBiNYqaKxPmrawdqcqFw/tFBXBA96KhpcINhMNKoueq
        44x4Mw+4GwYYL6KpW5b7S722sS7EJmwgaMZdw6ZEp8XOORI1gwtczMQ6pSfKtDLG
        fPvVHxQ4q/Rjdky4zSN/coWlCej5cV743IS1SH9KW+cjGzW/9UI7HJZCpqYp0Gvs
        m94+PGECmS+qOnQKNKdYQIdkvlJkU+FQoJI/Y9JzXsl/8Y+qriI+bm9WLyOf67wF
        iotC7BPX8f5v5GqPxHEMP8m8XJvQWhuyM0XvfGHxfu6drUAuq3YcGpZgbRyPml1+
        fzjZGSKf07ny85rvvIoMrclH4Zuua+XxUCiTfnINXOXH8tSEvscH4jElyxrDjqK6
        Q/nC/d4M4AOCWZH0Ru4Y9ogGzXy15Dgvj7lg33lWfVBvIVX1Ay0Z1WZXTH9ZpJo2
        cNYMTuMZHLJuSEV6matxkgQJ87uSSIOiu6foQcWMRAvao1bDhwdZWsvEpwZQHYkS
        lWp0Ur0jyYba2prAbK9Q4FmcNZKfdE/RfHlaG2Vj2SuLnhRcO+VU7bkwzQARAQAB
        tB5NYXR0aGV3IFNsaXBwZXIgPG1hdHRAaXJvbi5zaD6JAlQEEwEIAD4WIQR5acfh
        MfKWUsYBdSxk2IAi28ZF0QUCadPWsgIbAwUJAeEzgAULCQgHAgYVCgkICwIEFgID
        AQIeAQIXgAAKCRBk2IAi28ZF0WPeD/42DXwIgC2Ftz7/ZWUI7k2sqjUPia6pN6YE
        CMvoeaHkLJ+KmTJLDUt4dEdGmx1kl5P5AcS9MDz0qagg6Ni9hSWr8d7ZVWwtsZo3
