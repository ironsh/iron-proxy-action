name: 'Iron Proxy Summary'
description: 'Summarize iron-proxy egress traffic'

inputs:
  log-file:
    description: 'Path to the iron-proxy log file'
    required: false
    default: '/var/log/iron-proxy.log'
  show-full-paths:
    description: 'Show per-path request breakdown in a collapsible section'
    required: false
    default: 'false'

runs:
  using: 'node24'
  main: 'index.js'
